<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>蒼き彼方への旅 - 試し読み前演出</title>
    <meta name="description" content="蒼き彼方への旅の試し読みへ進む前に表示する海中演出ページです。">
    <link rel="stylesheet" href="./aokana_styles.css">
  </head>
  <body>
    <!--
      本体サイト接続点:
      制作物一覧の「蒼き彼方への旅」試し読みリンクを ./aokana.html に向けると
      中間演出ページとして動作します。
      Noteへの遷移先は aokana_script.js の AOKANAYOU_INTRO_CONFIG.noteUrl で管理します。
    -->
    <main class="aokanayou-intro" aria-label="蒼き彼方への旅 試し読み前演出">
      <div class="sea-background" aria-hidden="true"></div>
      <div class="sea-vignette" aria-hidden="true"></div>
      <div class="light-shafts" aria-hidden="true"></div>
      <div class="particle-field" aria-hidden="true"></div>
      <div class="bubble-field" aria-hidden="true"></div>

      <section class="memory-stage" aria-live="polite" aria-atomic="true">
        <p id="memoryLine" class="memory-line"></p>
        <p id="finalLine" class="final-line" aria-hidden="true">死霊、往生なさい</p>
      </section>

      <button id="skipButton" class="skip-button" type="button">本文へ</button>
    </main>

    <script src="./aokana_script.js" defer></script>
  </body>
</html>
